kind = "web"
previewPath = "/"
title = "Zain Manzoor & Co Construction"
version = "1.0.0"
id = "artifacts/zmco-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19257

[services.development]
run = "pnpm --filter @workspace/zmco-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zmco-website", "run", "build" ]
publicDir = "artifacts/zmco-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19257"
BASE_PATH = "/"
